# Ruff configuration for hireloop-api
target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (real bugs: undefined names, unused vars/imports)
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print (no print statements)
    "RUF",  # ruff-specific rules
]
# Type-hint coverage is enforced by mypy (see setup.cfg), so we don't also run
# flake8-annotations (ANN) here — it flags legitimate `Any` and internal helpers
# as noise. The ignores below are false-positives or intentional patterns.
ignore = [
    "E501",    # Line length — long SQL / user copy; not hard-wrapped.
    "E402",    # Module import not at top — intentional lazy imports avoid circular deps.
    "N806",    # Non-lowercase locals — occasional SQL/const-style names.
    "S105",    # "hardcoded password" — false positives on config field NAMES (secret_key…).
    "S106",    # same, as function args.
    "S603",    # subprocess — controlled, internal, no shell.
    "S607",    # partial executable path — internal tooling only.
    "S608",    # SQL via f-string — values bind with $1/$2 params (asyncpg), not interpolation.
    "B008",    # Function call in arg default — required for FastAPI Depends().
    "RUF001",  # Ambiguous unicode — em-dashes / smart punctuation in copy are intentional.
    "RUF002",  # docstring variant of RUF001.
    "RUF003",  # comment variant of RUF001.
    "RUF006",  # Dangling asyncio task — deliberate fire-and-forget background work.
]

[lint.per-file-ignores]
# Tests: asserts and fake tokens/passwords are expected; broad assert-raises is fine.
"tests/**" = ["S101", "S105", "S106", "B017"]
# CLI helper scripts legitimately print to stdout and use throwaway tokens.
"scripts/**" = ["T201", "S105", "S106"]

[lint.isort]
known-first-party = ["hireloop_api"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
