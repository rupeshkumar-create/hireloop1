<h2>Sign in to Hireloop</h2>
<p>Tap below to sign in. This link opens Hireloop directly and works in any browser (including private/incognito).</p>
<p>
  <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email"
    >Sign in to Hireloop</a
  >
</p>
<p style="font-size:12px;color:#666">If the button does not work, copy this URL into your browser:<br />{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email</p>
