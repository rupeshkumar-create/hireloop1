name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — lint + tests (incl. IDOR)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image so the vector columns in migrations apply cleanly.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hireloop_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: api
    env:
      # Integration tests (tenant-isolation / IDOR) run against this DB.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hireloop_test
      REQUIRE_INTEGRATION_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Bootstrap integration database
        run: uv run python scripts/bootstrap_integration_db.py
      - name: Tests (unit + integration IDOR)
        run: uv run pytest -q

  frontend:
    name: Frontend — lint + typecheck + production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck (web + app)
        run: pnpm typecheck
      - name: Lint (web + app)
        run: pnpm lint
      - name: Production build (web + app)
        run: pnpm build:web && pnpm build:app

  security:
    name: Security — secret scan + dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Python dependency audit
        run: |
          cd api
          uv export --format requirements-txt --no-dev > /tmp/requirements.txt
          pipx run pip-audit -r /tmp/requirements.txt
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: JavaScript production dependency audit
        run: pnpm audit --prod --audit-level high
